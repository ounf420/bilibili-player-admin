<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公子影院 - 高清视频平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --bg-card: #141414;
            --bg-hover: #1a1a1a;
            --accent: #00a1d6;
            --accent-glow: rgba(0, 161, 214, 0.3);
            --text-primary: #e3e5e7;
            --text-secondary: #8b8b8b;
            --text-muted: #5a5a5a;
            --border: rgba(255, 255, 255, 0.06);
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== 背景光效 ===== */
        .bg-glow {
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(0, 161, 214, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 48px;
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            background: rgba(10, 10, 10, 0.95);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .nav-brand .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #00d4aa);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            color: white;
            letter-spacing: -1px;
        }

        .nav-brand .name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .nav-center {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 20px;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.06);
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: var(--accent);
            border-radius: 1px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid transparent;
            border-radius: 20px;
            padding: 8px 16px;
            gap: 8px;
            transition: all 0.3s ease;
            width: 200px;
        }

        .search-box:focus-within {
            border-color: var(--accent);
            background: rgba(0, 161, 214, 0.06);
            width: 280px;
        }

        .search-box input {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            width: 100%;
            font-family: inherit;
        }

        .search-box input::placeholder { color: var(--text-muted); }
        .search-box i { color: var(--text-muted); font-size: 14px; }

        .nav-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .nav-avatar:hover { transform: scale(1.1); }

        /* ===== Hero 区域 ===== */
        .hero {
            margin-top: 64px;
            padding: 60px 48px 40px;
            position: relative;
            z-index: 1;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero-main {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 16 / 9;
            cursor: pointer;
            group: true;
        }

        .hero-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .hero-main:hover img { transform: scale(1.05); }

        .hero-main .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 40%, rgba(0, 0, 0, 0.85) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 32px;
        }

        .hero-main .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            width: fit-content;
            margin-bottom: 12px;
        }

        .hero-main .title {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .hero-main .desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 400px;
        }

        .hero-main .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 72px;
            height: 72px;
            background: rgba(0, 161, 214, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .hero-main:hover .play-btn {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .play-btn i {
            font-size: 24px;
            color: white;
            margin-left: 4px;
        }

        .hero-side {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 24px;
        }

        .hero-card {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
        }

        .hero-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .hero-card:hover img { transform: scale(1.05); }

        .hero-card .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 24px;
        }

        .hero-card .title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .hero-card .meta {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ===== 分区标题 ===== */
        .section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 48px;
            margin-bottom: 48px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title .icon {
            width: 4px;
            height: 24px;
            background: var(--accent);
            border-radius: 2px;
        }

        .section-more {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .section-more:hover { color: var(--accent); }

        /* ===== 视频卡片网格 ===== */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        .video-card {
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .video-card:hover { transform: translateY(-4px); }

        .video-card .thumb {
            position: relative;
            aspect-ratio: 16 / 10;
            overflow: hidden;
            border-radius: var(--radius-sm);
        }

        .video-card .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .video-card:hover .thumb img { transform: scale(1.08); }

        .video-card .thumb .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .video-card .thumb .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .video-card:hover .thumb .play-icon { opacity: 1; }
        .play-icon i { font-size: 18px; color: white; margin-left: 3px; }

        .video-card .info {
            padding: 12px 4px;
        }

        .video-card .info .title {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
            transition: color 0.2s;
        }

        .video-card:hover .info .title { color: var(--accent); }

        .video-card .info .meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .video-card .info .meta i { font-size: 11px; margin-right: 3px; }

        /* ===== 热门排行 ===== */
        .rank-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .rank-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }

        .rank-item:hover {
            background: var(--bg-hover);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(4px);
        }

        .rank-num {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .rank-item:nth-child(1) .rank-num { color: #ff6b6b; }
        .rank-item:nth-child(2) .rank-num { color: #ffa94d; }
        .rank-item:nth-child(3) .rank-num { color: #ffd43b; }

        .rank-thumb {
            width: 120px;
            height: 68px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .rank-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rank-info { flex: 1; min-width: 0; }

        .rank-info .title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rank-info .meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ===== 底部 ===== */
        .footer {
            margin-top: 80px;
            padding: 40px 48px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .footer p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover { color: var(--accent); }

        /* ===== 动画 ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeInUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--text-muted);
            opacity: 0.5;
        }

        .empty-state .title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .empty-state .desc {
            font-size: 14px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1200px) {
            .video-grid { grid-template-columns: repeat(4, 1fr); }
        }

        @media (max-width: 992px) {
            .hero-grid { grid-template-columns: 1fr; }
            .hero-side { display: none; }
            .video-grid { grid-template-columns: repeat(3, 1fr); }
            .navbar { padding: 0 24px; }
            .hero, .section { padding: 0 24px; }
        }

        @media (max-width: 768px) {
            .video-grid { grid-template-columns: repeat(2, 1fr); }
            .rank-grid { grid-template-columns: 1fr; }
            .nav-center { display: none; }
            .search-box { width: 160px; }
            .search-box:focus-within { width: 200px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <a href="/" class="nav-brand">
            <div class="logo">G</div>
            <span class="name">公子影院</span>
        </a>
        <div class="nav-center">
            <a href="/" class="nav-link active">首页</a>
            <a href="/player/" class="nav-link">播放器</a>
            <a href="/admin/campaigns" class="nav-link">广告管理</a>
            <a href="/admin/videos" class="nav-link">视频管理</a>
        </div>
        <div class="nav-right">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="搜索视频...">
            </div>
            <!-- 未登录状态 -->
            <div id="navGuest" style="display:flex;gap:8px;">
                <a href="/login" class="nav-link" style="padding:8px 16px;">登录</a>
                <a href="/register" class="nav-link" style="padding:8px 16px;background:var(--accent);color:#fff;border-radius:8px;">注册</a>
            </div>
            <!-- 已登录状态 -->
            <div id="navUser" style="display:none;gap:12px;align-items:center;">
                <a href="/account" class="nav-link" style="padding:8px 16px;">
                    <i class="fas fa-tachometer-alt"></i> 控制台
                </a>
                <a href="/account" class="nav-avatar-link">
                    <div class="nav-avatar" id="navAvatar">U</div>
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <section class="hero">
        <div class="hero-grid">
            <div class="hero-main animate-in" id="heroMain">
                <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=900&h=500&fit=crop" alt="精选视频">
                <div class="overlay">
                    <div class="tag"><i class="fas fa-fire"></i> 精选推荐</div>
                    <div class="title">精选视频内容</div>
                    <div class="desc">高清流畅播放体验，支持多种视频格式</div>
                </div>
                <div class="play-btn"><i class="fas fa-play"></i></div>
            </div>
            <div class="hero-side">
                <div class="hero-card animate-in delay-1">
                    <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=600&h=300&fit=crop" alt="热门视频">
                    <div class="overlay">
                        <div class="title">热门视频</div>
                        <div class="meta"><i class="fas fa-eye"></i> 1.2万播放</div>
                    </div>
                </div>
                <div class="hero-card animate-in delay-2">
                    <img src="https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d?w=600&h=300&fit=crop" alt="最新上线">
                    <div class="overlay">
                        <div class="title">最新上线</div>
                        <div class="meta"><i class="fas fa-clock"></i> 今日更新</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 热门视频 -->
    <section class="section animate-in delay-3">
        <div class="section-header">
            <div class="section-title">
                <div class="icon"></div>
                热门视频
            </div>
            <a href="/player/" class="section-more">查看更多 <i class="fas fa-chevron-right"></i></a>
        </div>
        <div class="video-grid" id="videoGrid">
            <!-- 动态加载 -->
        </div>
    </section>

    <!-- 热门排行 -->
    <section class="section animate-in delay-4">
        <div class="section-header">
            <div class="section-title">
                <div class="icon"></div>
                热门排行
            </div>
        </div>
        <div class="rank-grid" id="rankGrid">
            <!-- 动态加载 -->
        </div>
    </section>

    <!-- 底部 -->
    <footer class="footer animate-in delay-5">
        <p>© 2026 公子影院 - 高清视频平台 | <a href="/player/">播放器</a> | <a href="/admin/">后台管理</a></p>
    </footer>

    <script>
        // 检查登录状态
        function checkLoginStatus() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            
            if (token && userStr) {
                try {
                    const user = JSON.parse(userStr);
                    // 显示已登录状态
                    document.getElementById('navGuest').style.display = 'none';
                    document.getElementById('navUser').style.display = 'flex';
                    // 设置头像
                    const avatar = document.getElementById('navAvatar');
                    if (user.avatar) {
                        avatar.innerHTML = '<img src="' + user.avatar + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
                    } else {
                        avatar.textContent = (user.name || user.username || 'U').charAt(0).toUpperCase();
                    }
                } catch (e) {
                    console.error('解析用户信息失败:', e);
                }
            }
        }
        
        // 页面加载时检查登录状态
        checkLoginStatus();
        
        // 导航栏滚动效果
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            navbar.classList.toggle('scrolled', window.scrollY > 20);
        });

        // 加载视频列表
        async function loadVideos() {
            try {
                const res = await fetch('/api/videos');
                const videos = await res.json();
                
                const videoGrid = document.getElementById('videoGrid');
                const rankGrid = document.getElementById('rankGrid');

                if (videos.length === 0) {
                    videoGrid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <i class="fas fa-video"></i>
                            <div class="title">暂无视频</div>
                            <div class="desc">请在后台添加视频内容</div>
                        </div>
                    `;
                    return;
                }

                // 视频卡片
                videoGrid.innerHTML = videos.map((v, i) => `
                    <div class="video-card" onclick="location.href='/player/?id=${v.id}'">
                        <div class="thumb">
                            <img src="${v.cover || 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400&h=250&fit=crop'}" alt="${v.title}">
                            <div class="duration">${formatDuration(v.duration)}</div>
                            <div class="play-icon"><i class="fas fa-play"></i></div>
                        </div>
                        <div class="info">
                            <div class="title">${v.title}</div>
                            <div class="meta">
                                <span><i class="fas fa-eye"></i> ${formatViews(v.views)}</span>
                                <span><i class="fas fa-heart"></i> ${v.likes || 0}</span>
                            </div>
                        </div>
                    </div>
                `).join('');

                // 排行榜
                const sorted = [...videos].sort((a, b) => (b.views || 0) - (a.views || 0));
                rankGrid.innerHTML = sorted.slice(0, 6).map((v, i) => `
                    <div class="rank-item" onclick="location.href='/player/?id=${v.id}'">
                        <div class="rank-num">${i + 1}</div>
                        <div class="rank-thumb">
                            <img src="${v.cover || 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=200&h=120&fit=crop'}" alt="${v.title}">
                        </div>
                        <div class="rank-info">
                            <div class="title">${v.title}</div>
                            <div class="meta"><i class="fas fa-eye"></i> ${formatViews(v.views)} 播放</div>
                        </div>
                    </div>
                `).join('');

                // 更新Hero
                if (videos.length > 0) {
                    const top = videos[0];
                    const heroMain = document.getElementById('heroMain');
                    if (top.cover) {
                        heroMain.querySelector('img').src = top.cover;
                    }
                    heroMain.querySelector('.title').textContent = top.title;
                    heroMain.querySelector('.desc').textContent = top.description || '高清流畅播放体验';
                    heroMain.onclick = () => location.href = `/player/?id=${top.id}`;
                }
            } catch (err) {
                console.error('加载视频失败:', err);
            }
        }

        function formatDuration(sec) {
            if (!sec) return '00:00';
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function formatViews(n) {
            if (!n) return '0';
            if (n >= 10000) return (n / 10000).toFixed(1) + '万';
            return n.toString();
        }

        loadVideos();
    </script>

<!-- notice popup -->
<div id="notice-popup" class="notice-popup" style="display: none;">
    <div class="notice-popup-overlay"></div>
    <div class="notice-popup-content">
        <div class="notice-popup-header">
            <div class="notice-popup-icon"><i class="fas fa-bullhorn"></i></div>
            <h3 class="notice-popup-title">系统公告</h3>
            <button class="notice-popup-close" onclick="closeNoticePopup()"><i class="fas fa-times"></i></button>
        </div>
        <div class="notice-popup-body">
            <div class="notice-popup-loading"><i class="fas fa-spinner fa-spin"></i><span>加载中...</span></div>
            <div class="notice-popup-content-area" style="display: none;"></div>
        </div>
        <div class="notice-popup-footer">
            <label class="notice-popup-checkbox"><input type="checkbox" id="notice-popup-remember"><span class="checkmark"></span><span>今日不再显示</span></label>
            <button class="notice-popup-btn" onclick="closeNoticePopup()">我知道了</button>
        </div>
    </div>
</div>

<style>
.notice-popup{position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
.notice-popup-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
.notice-popup-content{position:relative;width:90%;max-width:500px;max-height:80vh;background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;animation:slideUp .3s ease}
.notice-popup-header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:20px 24px;display:flex;align-items:center;gap:12px}
.notice-popup-icon{width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.notice-popup-title{flex:1;margin:0;font-size:18px;font-weight:600}
.notice-popup-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.notice-popup-close:hover{background:rgba(255,255,255,.3)}
.notice-popup-body{padding:24px;max-height:50vh;overflow-y:auto}
.notice-popup-loading{text-align:center;color:#666;padding:20px}
.notice-popup-loading i{font-size:24px;margin-bottom:8px;display:block;color:#667eea}
.notice-popup-content-area{line-height:1.6;color:#333}
.notice-popup-content-area h1,.notice-popup-content-area h2,.notice-popup-content-area h3{color:#667eea;margin-top:0}
.notice-popup-content-area p{margin-bottom:12px}
.notice-popup-content-area ul,.notice-popup-content-area ol{margin-bottom:12px;padding-left:20px}
.notice-popup-content-area li{margin-bottom:6px}
.notice-popup-content-area .highlight{background:linear-gradient(120deg,#a1c4fd 0%,#c2e9fb 100%);padding:12px 16px;border-radius:8px;margin:12px 0;border-left:4px solid #667eea}
.notice-popup-content-area .success{background:#d4edda;border-left:4px solid #28a745;padding:12px 16px;border-radius:8px;margin:12px 0;color:#155724}
.notice-popup-content-area .feature-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px 0}
.notice-popup-content-area .feature-item{background:#f8f9fa;padding:12px;border-radius:8px;text-align:center}
.notice-popup-content-area .feature-item i{font-size:24px;color:#667eea;margin-bottom:8px;display:block}
.notice-popup-content-area .feature-item h4{margin:0 0 4px;font-size:14px;color:#333}
.notice-popup-content-area .feature-item p{margin:0;font-size:12px;color:#666}
.notice-popup-footer{padding:16px 24px;background:#f8f9fa;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #eee}
.notice-popup-checkbox{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:#666;user-select:none}
.notice-popup-checkbox input{display:none}
.notice-popup-checkbox .checkmark{width:18px;height:18px;border:2px solid #ddd;border-radius:4px;position:relative;transition:all .2s}
.notice-popup-checkbox input:checked+.checkmark{background:#667eea;border-color:#667eea}
.notice-popup-checkbox input:checked+.checkmark::after{content:"";position:absolute;left:5px;top:2px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.notice-popup-btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:transform .2s,box-shadow .2s}
.notice-popup-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(102,126,234,.4)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@media(max-width:768px){.notice-popup-content{width:95%;max-height:85vh;margin:20px}.notice-popup-header{padding:16px 20px}.notice-popup-title{font-size:16px}.notice-popup-body{padding:16px 20px;max-height:60vh}.notice-popup-footer{padding:12px 20px;flex-direction:column;gap:12px}.notice-popup-btn{width:100%;padding:12px}.notice-popup-content-area .feature-grid{grid-template-columns:1fr}}
</style>

<script>
let noticePopupData=null;
function shouldShowNoticePopup(){const t=new Date().toDateString();return localStorage.getItem("notice_popup_hidden")!==t}
async function showNoticePopup(){if(!shouldShowNoticePopup())return;try{const r=await fetch("/api/notices/popup");const d=await r.json();if(d.success&&d.data){noticePopupData=d.data;renderNoticePopup(noticePopupData);document.getElementById("notice-popup").style.display="flex";document.body.style.overflow="hidden"}}catch(e){console.error("获取弹窗公告失败:",e)}}
function renderNoticePopup(n){const c=document.querySelector(".notice-popup-content-area");const l=document.querySelector(".notice-popup-loading");document.querySelector(".notice-popup-title").textContent=n.title||"系统公告";const i=document.querySelector(".notice-popup-icon i");if(n.icon)i.className=n.icon;if(n.bg_color)document.querySelector(".notice-popup-header").style.background=n.bg_color;c.innerHTML=n.content;l.style.display="none";c.style.display="block"}
function closeNoticePopup(){const r=document.getElementById("notice-popup-remember").checked;if(r)localStorage.setItem("notice_popup_hidden",new Date().toDateString());if(noticePopupData)fetch("/api/notices/"+noticePopupData.id+"/read",{method:"POST",headers:{"Content-Type":"application/json"}}).catch(e=>{});const p=document.getElementById("notice-popup");p.style.animation="fadeOut .3s ease";setTimeout(()=>{p.style.display="none";document.body.style.overflow="";p.style.animation=""},300)}
document.addEventListener("click",e=>{if(e.target.classList.contains("notice-popup-overlay"))closeNoticePopup()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeNoticePopup()});
document.addEventListener("DOMContentLoaded",()=>setTimeout(showNoticePopup,1000));
</script>

</body>
